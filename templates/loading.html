<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KubeHealth — Loading</title>
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --text: #e2e8f0; --muted: #64748b; --accent: #6366f1; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }

  .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  .orbit {
    position: relative;
    width: 80px;
    height: 80px;
  }
  .orbit-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--accent);
    animation: spin 1.1s linear infinite;
  }
  .orbit-ring:nth-child(2) {
    inset: 12px;
    border-top-color: #818cf8;
    animation-duration: 0.8s;
    animation-direction: reverse;
  }
  .orbit-ring:nth-child(3) {
    inset: 24px;
    border-top-color: #a5b4fc;
    animation-duration: 1.5s;
  }
  .orbit-core {
    position: absolute;
    inset: 34px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes spin  { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 0.8; transform: scale(1.1); } }

  .status { text-align: center; }
  .status p { font-size: 1rem; font-weight: 500; }
  .status small { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; display: block; }
  .counter { font-size: 0.82rem; color: var(--accent); margin-top: 0.3rem; font-variant-numeric: tabular-nums; }

  .skeleton-grid {
    display: grid;
    grid-template-columns: repeat(3, 180px);
    gap: 0.75rem;
    opacity: 0.3;
  }
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .skel {
    border-radius: 4px;
    background: linear-gradient(90deg, var(--border) 25%, #333647 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .skel-title { height: 10px; width: 70%; }
  .skel-line  { height: 8px;  width: 90%; }
  .skel-line.short { width: 50%; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  @media (max-width: 600px) { .skeleton-grid { grid-template-columns: repeat(2, 140px); } }
</style>
</head>
<body>
  <div class="logo">Kube<span>Health</span></div>
  <div class="orbit">
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-core"></div>
  </div>
  <div class="status">
    <p>Scanning namespaces&hellip;</p>
    <small>Fetching events one namespace at a time</small>
    <div class="counter" id="counter"></div>
  </div>
  <div class="skeleton-grid">
    <div class="skeleton-card"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
    <div class="skeleton-card"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
    <div class="skeleton-card"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
    <div class="skeleton-card"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
    <div class="skeleton-card"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
    <div class="skeleton-card"><div class="skel skel-title"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
  </div>
<script>
  (function poll() {
    fetch('/api/status')
      .then(r => r.json())
      .then(s => {
        const el = document.getElementById('counter');
        if (s.total > 0) {
          el.textContent = s.loaded + ' / ' + s.total + ' namespaces loaded';
        }
        // Redirect as soon as there is any data to show — don't wait for all namespaces.
        if (s.loaded > 0) {
          location.replace('/');
        } else {
          setTimeout(poll, 1500);
        }
      })
      .catch(() => setTimeout(poll, 2000));
  })();
</script>
</body>
</html>
