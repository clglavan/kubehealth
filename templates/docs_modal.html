<style>

  #sw, #sc, #sa, #sr {
    transition: opacity 0.22s, stroke-width 0.22s;

  #da-ai,#da-logs,#da-corr,#da-rca-k8s,#da-rca-lm,#da-settings,#da-aiagent {
    transition: opacity 0.22s, stroke-width 0.22s;
  }
  #dc-ai:hover,#dc-logs:hover,#dc-corr:hover,#dc-rca:hover,
  #dc-settings:hover,#dc-aiagent:hover,#dc-docs:hover { filter:brightness(1.7); }
</style>

<script>
(function(){
  window.docsOpen  = function(){ document.getElementById('docs-overlay').style.display=''; document.getElementById('docs-modal').style.display='flex'; };
  window.docsClose = function(){ document.getElementById('docs-overlay').style.display='none'; document.getElementById('docs-modal').style.display='none'; };
  document.addEventListener('keydown',function(e){ if(e.key==='Escape' && document.getElementById('docs-modal').style.display!=='none') docsClose(); });

  var cfg = {
    'dc-ai':{
      nodes:['ns','nl'], sub:['sa','sc'],
      arrows:['da-ai'],
      hint:'✦ AI  —  reads nsCache + calls K8s for describe + calls K8s for pod logs (if Pod) → streams to LM Studio → tokens stored in aiInsightCache every 300 ms → browser polls /api/ai/insights every 500 ms'
    },
    'dc-logs':{
      nodes:['nk','ns'], sub:['sc'],
      arrows:['da-logs'],
      hint:'Logs  —  reads nsCache for container hint → calls K8s GetLogs (current, then Previous=true fallback for CrashLoopBackOff) → returns directly.  Zero LLM.'
    },
    'dc-corr':{
      nodes:['ns'], sub:['sc'],
      arrows:['da-corr'],
      hint:'Correlate  —  scans nsCache across ALL namespaces for events in ±5 min window.  ZERO Kubernetes API calls.  ZERO LLM calls.  Instant in-memory scan.'
    },
    'dc-rca':{
      nodes:['nk','ns','nl'], sub:['sr','sc'],
      arrows:['da-rca-k8s','da-rca-lm'],
      hint:'RCA  —  reads nsCache + calls K8s for describe + pod logs (initial context) → sends to LM Studio with 4 tools → model calls tools (some → nsCache, some → K8s) → loops up to maxIter → browser polls /api/rca/status every 2 s'
    },
    'dc-settings':{
      nodes:['ns'], sub:[],
      arrows:['da-settings'],
      hint:'Settings  —  Log Lines (Logs + AI/RCA context size), LLM Timeout (large objects like Elasticsearch need 3–5 min prompt processing), Max Concurrent Calls, RCA Max Iterations'
    },
    'dc-aiagent':{
      nodes:['nl'], sub:[],
      arrows:['da-aiagent'],
      hint:'AI Agent  —  system prompt (injected as "system" role on every LLM call), live model context window estimate, response format (hardcoded — cannot be broken by the system prompt)'
    },
    'dc-docs':{ nodes:[], sub:[], arrows:[], hint:'You\'re looking at the system architecture.  Hover each chip to trace its data flow.' },
  };

  function apply(c){
    var allN=['nk','ns','nl'], allS=['sw','sc','sa','sr'];
    var allA=['da-ai','da-logs','da-corr','da-rca-k8s','da-rca-lm','da-settings','da-aiagent'];
    var has=c.nodes.length>0;
    allN.forEach(function(n){
      var g=document.getElementById('n'+n+'-g'), b=document.getElementById('n'+n+'-b');
      if(!g||!b)return;
      var on=c.nodes.indexOf(n)>=0, dim=has&&!on;
      g.style.opacity=on?'0.55':dim?'0.02':'';
      b.style.opacity=dim?'0.15':'1';
      b.style.strokeWidth=on?'2.8':'1.8';
    });
    allS.forEach(function(id){
      var el=document.getElementById(id); if(!el)return;
      var on=c.sub.indexOf(id)>=0, dim=has&&!on;
      el.style.opacity=dim?'0.18':'1';
      el.style.strokeWidth=on?'2':'1.2';
    });
    allA.forEach(function(id){
      var el=document.getElementById(id); if(!el)return;
      var on=c.arrows.indexOf(id)>=0, dim=has&&!on;
      el.style.opacity=on?'0.88':dim?'0.02':'0.08';
      el.style.strokeWidth=on?'3':'2';
    });
    var h=document.getElementById('doc-hint');
    if(h){ h.textContent=c.hint||'Hover an action chip to trace its exact data flow'; h.style.fill=c.hint?'#94a3b8':'#3d4870'; }
  }

  function reset(){
    apply({nodes:[],sub:[],arrows:[],hint:''});
    var h=document.getElementById('doc-hint');
    if(h){ h.textContent='Hover an action chip to trace its exact data flow'; h.style.fill='#3d4870'; }
  }

  document.addEventListener('DOMContentLoaded',function(){
    Object.keys(cfg).forEach(function(id){
      var el=document.getElementById(id); if(!el)return;
      el.addEventListener('mouseenter',function(){ apply(cfg[id]); });
      el.addEventListener('mouseleave',reset);
    });
  });
})();
</script>
